name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Native unit + closed-loop regression tests
        run: pio test -e native

      - name: Build simulator and run smoke scenarios
        run: |
          pio run -e native
          for s in cold_start espresso maxdraw flush full; do
            .pio/build/native/program --scenario "$s" --csv /dev/null
          done

      - name: Round-trip capture->fit validation (sim truth recovered)
        run: |
          .pio/build/native/program --scenario ident --serial-format \
            | python tools/fit_model.py - --expect-sim

      - name: Capture replay + ctl injection + scenario validation
        run: |
          .pio/build/native/program --scenario ident --serial-format > ident.log
          .pio/build/native/program --scenario full --serial-format > full.log
          # replay through tune_capture's code path, then fit the result
          python tools/tune_capture.py --replay ident.log --name ci_replay \
            --status-json status.json < /dev/null
          python tools/fit_model.py captures/*-ci_replay.log --expect-sim
          grep -q '"stop_reason": "replay-exhausted"' status.json
          # ctl-file injection: mark must land in the capture, STOP must stop
          printf 'mark ctltest\nSTOP\n' > inject.ctl
          python tools/tune_capture.py --replay ident.log --name ci_ctl \
            --ctl inject.ctl --status-json ctl_status.json < /dev/null
          grep -q "ctltest" captures/*-ci_ctl.log
          grep -q '"stop_reason": "ctl-stop"' ctl_status.json
          # scenario quality gates against sim captures
          python tools/fit_model.py ident.log --validate ident
          python tools/fit_model.py full.log --validate cold_start
          python tools/fit_model.py full.log --validate espresso
          python tools/fit_model.py full.log --validate flush
          python tools/fit_model.py full.log --validate bigdraw

      - name: Sensor-calibration fit selftest
        run: python tools/calibrate.py --selftest

      - name: Build ESP32-C3 firmware
        run: pio run -e esp32c3

      - name: Build sensor-observer firmware
        run: pio run -e esp32c3-observer

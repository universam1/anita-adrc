; anita-adrc — ADRC boiler temperature controller for a Lelit Anita (PL042)
;
; Two environments:
;   esp32c3 — the real firmware (ESP32-C3 0.42" OLED board, Arduino core)
;   native  — host build: unit tests (pio test -e native) and the boiler
;             simulator (pio run -e native, binary dumps CSV for tools/plot_sim.py)

[platformio]
default_envs = esp32c3

[env]
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
build_unflags = -std=gnu++11

[env:esp32c3]
platform = espressif32@^6.9.0
board = esp32-c3-devkitm-1          ; 01Space ESP32-C3-0.42LCD is a devkitm-1 clone
framework = arduino
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1    ; serial console on the native USB port
monitor_speed = 115200
lib_deps =
    olikraus/U8g2@^2.35.30
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0

; Standalone sensor-observer firmware for the one-time DS18B20 reference run
; (per-NTC curve calibration, docs/tuning-hardware.md step 0). Streams raw
; NTC millivolts + DS18B20 reference temps; NOT the espresso controller.
[env:esp32c3-observer]
platform = espressif32@^6.9.0
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
    ${env.build_flags}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_speed = 115200
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
build_src_filter = -<*> +<../apps/observer/>

[env:native]
platform = native
build_flags =
    ${env.build_flags}
    -D NATIVE_SIM
    -O2
; The simulator entry point lives in sim/, not src/ (src/ is ESP32-only code).
build_src_filter = -<*> +<../sim/*.cpp>
test_framework = unity
